<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anniversary Island Game 💖</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

canvas{
    display:block;
    background-image:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
    background-size:cover;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 🖼️ PLAYER IMAGE */
let playerImg = new Image();
playerImg.src = "IMG_1793-2.PNG";

/* 🎁 CHEST IMAGE */
let chestImg = new Image();
chestImg.src = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/..."; // KEEP YOUR FULL STRING

/* 🟦 Player */
let player = {
    x: 150,
    y: 100,
    size: 80,
    speed: 6
};

/* 🎁 Goal */
let goal = {
    x: canvas.width - 250,
    y: canvas.height / 2,
    width: 140,
    height: 100,
    opened: false,
    split: 0
};

/* 🎮 Controls */
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;

    if(e.key.toLowerCase() === "e"){
        if(
            player.x < goal.x + goal.width &&
            player.x + player.size > goal.x &&
            player.y < goal.y + goal.height &&
            player.y + player.size > goal.y
        ){
            goal.opened = true;
            document.getElementById("music").play();
        }
    }
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

/* 💖 Hearts particles */
let hearts = [];

function createHearts(){
    for(let i=0;i<30;i++){
        hearts.push({
            x: goal.x + goal.width/2,
            y: goal.y,
            vx: (Math.random()-0.5)*6,
            vy: Math.random()*-6,
            size: 30
        });
    }
}

function drawHearts(){
    ctx.font = "30px Arial";
    hearts.forEach(h=>{
        h.x += h.vx;
        h.y += h.vy;
        h.vy += 0.2;

        ctx.fillText("💖", h.x, h.y);
    });
}

/* ✨ Sparkles */
function drawSparkles(){
    for(let i=0;i<10;i++){
        ctx.fillStyle="white";
        ctx.fillRect(
            goal.x + Math.random()*goal.width,
            goal.y + Math.random()*goal.height,
            3,3
        );
    }
}

/* 🎮 Game Loop */
function update(){

    // Movement
    if(keys["w"] || keys["arrowup"]) player.y -= player.speed;
    if(keys["s"] || keys["arrowdown"]) player.y += player.speed;
    if(keys["a"] || keys["arrowleft"]) player.x -= player.speed;
    if(keys["d"] || keys["arrowright"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* 🖼️ Player with glow */
    ctx.shadowColor = "pink";
    ctx.shadowBlur = 20;
    ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
    ctx.shadowBlur = 0;

    /* 🎁 Chest */
    if(!goal.opened){
        ctx.drawImage(chestImg, goal.x, goal.y, goal.width, goal.height);
        drawSparkles();
    } else {

        // FIRST TIME → create hearts
        if(goal.split === 0){
            createHearts();
        }

        goal.split += 2;

        // Smooth split animation
        ctx.drawImage(chestImg, goal.x - goal.split, goal.y, goal.width/2, goal.height);
        ctx.drawImage(chestImg, goal.x + goal.width/2 + goal.split, goal.y, goal.width/2, goal.height);

        drawHearts();

        ctx.font = "60px Arial";
        ctx.fillStyle = "white";
        ctx.fillText("💖 Happy Anniversary Mum & Dad 💖", canvas.width/2 - 500, 100);
    }

    /* 🎮 Instructions */
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Move with WASD / Arrows", 20, 30);
    ctx.fillText("Go to chest and press E 💖", 20, 60);

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
