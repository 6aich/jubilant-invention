<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anniversary Island Game 💖</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

/* 🌴 Island Background */
canvas{
    display:block;
    background-image:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
    background-size:cover;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 🟦 Player */
let player = {
    x: 150,
    y: 50,
    size: 30,
    speed: 7
};

/* 🟨 Golden Rectangle (Goal) */
let goal = {
    x: canvas.width - 200,
    y: canvas.height / 2,
    width: 80,
    height: 80,
    opened: false
};

/* 🎮 Controls */
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;

    // Press E to open
    if(e.key.toLowerCase() === "e"){
        if(
            player.x < goal.x + goal.width &&
            player.x + player.size > goal.x &&
            player.y < goal.y + goal.height &&
            player.y + player.size > goal.y
        ){
            goal.opened = true;
        }
    }
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

/* 💖 Draw Hearts */
function drawHearts(){
    ctx.font = "40px Arial";
    ctx.fillText("💖 💕 💞 💓 💗 💘", goal.x - 50, goal.y + 120);

    ctx.font = "50px Arial";
    ctx.fillText("Happy Anniversary Mum & Dad 💖", canvas.width/2 - 300, 100);
}

/* 🎮 Game Loop */
function update(){

    // Movement
    if(keys["w"] || keys["arrowup"]) player.y -= player.speed;
    if(keys["s"] || keys["arrowdown"]) player.y += player.speed;
    if(keys["a"] || keys["arrowleft"]) player.x -= player.speed;
    if(keys["d"] || keys["arrowright"]) player.x += player.speed;

    // Clear screen
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Draw player
    ctx.fillStyle = "lightgreen";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    // Draw goal
    if(!goal.opened){
        ctx.fillStyle = "gold";
        ctx.fillRect(goal.x, goal.y, goal.width, goal.height);
    } else {
        // Split animation (simple)
        ctx.fillStyle = "gold";
        ctx.fillRect(goal.x - 20, goal.y, goal.width/2, goal.height);
        ctx.fillRect(goal.x + goal.width/2 + 20, goal.y, goal.width/2, goal.height);

        drawHearts();
    }

    // Instructions
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Move with WASD or Arrow Keys", 20, 30);
    ctx.fillText("Go to the golden box and press E 💖", 20, 60);

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
